<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aramaixo Porra Admin</title>
    <style>
      body { font-family: system-ui, Arial; padding: 20px; }
      h1 { margin-top: 0 }
      .box { border: 1px solid #ddd; padding: 12px; margin-bottom: 12px; }
      label { display:block; margin-top:8px }
    </style>
  </head>
  <body>
    <h1>Aramaixo Porra — Admin (local)</h1>

    <div class="box">
      <h2>Txapelketak</h2>
      <ul id="txapelketak-list"></ul>
      <h3>Gehitu Txapelketa</h3>
      <label>Izena <input id="txap-izena" /></label>
      <label>Urtea <input id="txap-urtea" type="number" /></label>
      <button id="txap-add">Gehitu</button>
    </div>

    <div class="box">
      <h2>Porralariak</h2>
      <ul id="porra-list"></ul>
      <h3>Gehitu Porralaria</h3>
      <label>Izena <input id="porra-izena" /></label>
      <button id="porra-add">Gehitu</button>
    </div>

    <div class="box">
      <h2>Txirrindulariak</h2>
      <ul id="txirri-list"></ul>
      <h3>Gehitu Txirrindularia</h3>
      <label>Izena <input id="txirri-izena" /></label>
      <button id="txirri-add">Gehitu</button>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
